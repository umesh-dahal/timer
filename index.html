<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Honesty Timer Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0b1120;
            color: #e2e8f0;
            padding: 12px;
            padding-bottom: 40px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0 10px 0;
            border-bottom: 1px solid #1e293b;
            flex-wrap: wrap;
            gap: 8px;
        }
        h1 .title {
            font-size: 1.2rem;
        }
        .live-clock {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #38bdf8;
            letter-spacing: 2px;
            border: 1px solid #334155;
            font-variant-numeric: tabular-nums;
        }

        .top-actions {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .top-actions button {
            padding: 10px 16px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1;
            min-width: 60px;
            transition: 0.1s;
        }
        .top-actions button:active {
            transform: scale(0.94);
            opacity: 0.8;
        }
        .top-actions .export-btn {
            background: #059669;
            color: #fff;
        }
        .top-actions .export-btn:active {
            background: #34d399;
        }
        .top-actions .maybe-btn {
            background: #7c3aed;
            color: #fff;
        }
        .top-actions .maybe-btn:active {
            background: #a78bfa;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 10px 0;
            background: #1e293b;
            padding: 12px;
            border-radius: 14px;
            border-left: 4px solid #38bdf8;
        }
        .stats-grid .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .stats-grid .stat-item .label {
            font-size: 0.55rem;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 0.3px;
        }
        .stats-grid .stat-item .value {
            font-size: 1rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-top: 2px;
        }
        .stats-grid .stat-item .value.danger {
            color: #f87171;
        }
        .stats-grid .stat-item .value.success {
            color: #4ade80;
        }
        .stats-grid .stat-item .value.warning {
            color: #fbbf24;
        }

        .input-section {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: #1e293b;
            padding: 14px;
            border-radius: 14px;
            margin: 10px 0;
            align-items: center;
        }
        .input-section input,
        .input-section button {
            padding: 12px 12px;
            border-radius: 12px;
            border: none;
            font-size: 0.9rem;
            background: #0f172a;
            color: #f1f5f9;
            border: 1px solid #334155;
            -webkit-appearance: none;
            appearance: none;
        }
        .input-section input:focus {
            outline: 2px solid #38bdf8;
            border-color: transparent;
        }
        .input-section input[type="text"] {
            flex: 2;
            min-width: 120px;
        }
        .input-section input[type="time"] {
            width: 100px;
            padding: 12px 8px;
        }
        .input-section button {
            background: #38bdf8;
            color: #0b1120;
            font-weight: 700;
            cursor: pointer;
            border: none;
            padding: 12px 16px;
            flex: 1;
            min-width: 70px;
            touch-action: manipulation;
        }
        .input-section button:active {
            transform: scale(0.96);
            opacity: 0.8;
        }
        .input-section button.danger {
            background: #451a1a;
            color: #fca5a5;
        }
        .input-section button.danger:active {
            background: #7f1d1d;
        }

        .timeline {
            background: #1e293b;
            border-radius: 14px;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #2d3a4f;
        }
        .timeline-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 450px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 2px;
        }
        .timeline-grid::-webkit-scrollbar {
            width: 4px;
        }
        .timeline-grid::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 8px;
        }

        .task-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 12px;
            border-radius: 12px;
            background: #0f172a;
            border-left: 4px solid #475569;
            transition: 0.15s;
        }
        .task-row.active {
            background: #064e3b;
            border-left: 4px solid #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.08);
        }
        .task-row.finished-alarm {
            animation: flashRed 0.5s ease 3;
        }
        .task-row.flash-alert {
            animation: flashYellow 0.3s ease 5;
        }
        @keyframes flashRed {
            0% {
                background: #7f1d1d;
                border-left: 4px solid #f87171;
            }
            100% {
                background: #0f172a;
                border-left: 4px solid #475569;
            }
        }
        @keyframes flashYellow {
            0% {
                background: #78350f;
                border-left: 4px solid #fbbf24;
            }
            100% {
                background: #0f172a;
                border-left: 4px solid #475569;
            }
        }

        .task-row .task-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .task-row .task-time {
            font-family: monospace;
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.75rem;
            letter-spacing: 0.3px;
        }
        .task-row .task-name {
            font-weight: 600;
            font-size: 0.95rem;
            flex: 1;
        }
        .task-row .task-stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.7rem;
            color: #94a3b8;
            padding: 2px 0;
        }
        .task-row .task-stats .actual {
            color: #4ade80;
            font-weight: 600;
        }
        .task-row .task-stats .lost {
            color: #f87171;
            font-weight: 600;
        }
        .task-row .task-progress {
            width: 100%;
        }
        .task-row .task-progress .bar-bg {
            height: 5px;
            background: #2d3a4f;
            border-radius: 10px;
            overflow: hidden;
        }
        .task-row .task-progress .bar-bg .fill {
            height: 100%;
            background: #4ade80;
            width: 0%;
            transition: width 0.5s linear;
        }
        .task-row .task-progress .percent {
            font-size: 0.6rem;
            color: #94a3b8;
            margin-top: 2px;
            display: block;
        }

        .task-row .task-actions {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .task-row .task-actions button {
            border: none;
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1;
            min-width: 50px;
            transition: 0.1s;
        }
        .task-row .task-actions button:active {
            transform: scale(0.94);
            opacity: 0.8;
        }
        .task-row .task-actions .start-btn {
            background: #4ade80;
            color: #052e16;
        }
        .task-row .task-actions .stop-btn {
            background: #f59e0b;
            color: #0b1120;
        }
        .task-row .task-actions .edit-btn {
            background: #3b82f6;
            color: #fff;
            flex: 0.6;
            min-width: 45px;
        }
        .task-row .task-actions .delete-btn {
            background: #451a1a;
            color: #fca5a5;
            flex: 0.5;
            min-width: 45px;
        }
        .task-row .task-actions .save-edit-btn {
            background: #22d3ee;
            color: #0b1120;
            flex: 1;
        }
        .task-row .task-actions .cancel-edit-btn {
            background: #475569;
            color: #f1f5f9;
            flex: 0.5;
            min-width: 45px;
        }

        .task-row .edit-fields {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px 0;
            width: 100%;
        }
        .task-row.editing .edit-fields {
            display: flex;
        }
        .task-row.editing .task-top,
        .task-row.editing .task-stats,
        .task-row.editing .task-progress {
            display: none;
        }
        .task-row .edit-fields input {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 0.9rem;
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            min-width: 80px;
        }
        .task-row .edit-fields input:focus {
            outline: 2px solid #38bdf8;
            border-color: transparent;
        }
        .task-row .edit-fields input[type="time"] {
            flex: 0.6;
            min-width: 70px;
        }

        .conflict-warning {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin: 6px 0;
            display: none;
            border-left: 4px solid #f87171;
        }
        .conflict-warning.show {
            display: block;
        }

        .empty-state {
            color: #64748b;
            text-align: center;
            padding: 30px 0;
            font-style: italic;
            font-size: 0.9rem;
        }

        #statusMessage {
            margin-top: 10px;
            padding: 10px 14px;
            background: #1e293b;
            border-radius: 12px;
            color: #cbd5e1;
            font-size: 0.85rem;
            border-left: 4px solid #38bdf8;
            line-height: 1.5;
        }
        #statusMessage .highlight {
            color: #4ade80;
            font-weight: 600;
        }
        #statusMessage .danger {
            color: #f87171;
            font-weight: 600;
        }

        /* Modal for "Maybe Later" list */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: #1e293b;
            border-radius: 20px;
            padding: 24px;
            max-width: 450px;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            border: 1px solid #334155;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #2d3a4f;
            margin-bottom: 12px;
        }
        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .modal-header .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 8px;
        }
        .modal-header .close-btn:active {
            color: #f1f5f9;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .modal-body .maybe-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #0f172a;
            border-radius: 10px;
            margin-bottom: 6px;
            border-left: 3px solid #7c3aed;
        }
        .modal-body .maybe-item .item-text {
            font-size: 0.95rem;
            flex: 1;
        }
        .modal-body .maybe-item .item-actions button {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 8px;
            touch-action: manipulation;
        }
        .modal-body .maybe-item .item-actions .delete-maybe:active {
            color: #f87171;
        }
        .modal-body .maybe-item .item-actions .add-to-task:active {
            color: #4ade80;
        }
        .modal-input-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2d3a4f;
        }
        .modal-input-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 0.9rem;
            -webkit-appearance: none;
            appearance: none;
        }
        .modal-input-row input:focus {
            outline: 2px solid #7c3aed;
            border-color: transparent;
        }
        .modal-input-row button {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: #7c3aed;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            touch-action: manipulation;
        }
        .modal-input-row button:active {
            background: #a78bfa;
            transform: scale(0.96);
        }
        .empty-maybe {
            color: #64748b;
            text-align: center;
            padding: 20px 0;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 420px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr 1fr;
                padding: 8px;
                gap: 4px;
            }
            .stats-grid .stat-item .value {
                font-size: 0.85rem;
            }
            .stats-grid .stat-item .label {
                font-size: 0.5rem;
            }
            .input-section input[type="time"] {
                width: 85px;
                padding: 10px 6px;
                font-size: 0.8rem;
            }
            .input-section input[type="text"] {
                font-size: 0.8rem;
                padding: 10px 10px;
            }
            .input-section button {
                font-size: 0.75rem;
                padding: 10px 12px;
                min-width: 60px;
            }
            .task-row .task-name {
                font-size: 0.85rem;
            }
            .task-row .task-actions button {
                padding: 6px 10px;
                font-size: 0.65rem;
                min-width: 40px;
            }
            h1 {
                font-size: 1.1rem;
            }
            .live-clock {
                font-size: 0.9rem;
                padding: 4px 10px;
            }
            .top-actions button {
                font-size: 0.7rem;
                padding: 8px 12px;
            }
            .modal {
                padding: 16px;
            }
        }
        button,
        input {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="title">⏳ Honesty Pro</span>
            <span class="live-clock" id="liveClock">00:00:00</span>
        </h1>

        <!-- Top Actions -->
        <div class="top-actions">
            <button class="export-btn" onclick="exportCSV()">📊 Export Excel</button>
            <button class="maybe-btn" onclick="toggleModal(true)">📝 Maybe Later</button>
            <button class="export-btn" style="background:#dc2626;" onclick="testAlarm()">🔔 Test</button>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-item">
                <span class="label">📋 Tasks</span>
                <span class="value" id="totalTasks">0</span>
            </div>
            <div class="stat-item">
                <span class="label">⏱️ Planned</span>
                <span class="value" id="totalPlanned">0h</span>
            </div>
            <div class="stat-item">
                <span class="label">✅ Actual</span>
                <span class="value success" id="totalActual">0h</span>
            </div>
            <div class="stat-item">
                <span class="label">⚠️ Lost</span>
                <span class="value danger" id="totalLost">0h</span>
            </div>
            <div class="stat-item">
                <span class="label">▶️ Current</span>
                <span class="value warning" id="currentTaskDisplay">None</span>
            </div>
            <div class="stat-item">
                <span class="label">📅 Date</span>
                <span class="value" id="dateDisplay" style="font-size:0.8rem;">---</span>
            </div>
        </div>

        <div class="conflict-warning" id="conflictWarning">⚠️ Time conflict! This overlaps with an existing task.</div>

        <div class="input-section">
            <input type="text" id="taskName" placeholder="Task name" value="Deep Work">
            <input type="time" id="startTime" value="14:00">
            <input type="time" id="endTime" value="16:00">
            <button id="addTaskBtn">➕ Add</button>
            <button id="clearAllBtn" class="danger">🗑️</button>
        </div>

        <div class="timeline">
            <div class="timeline-grid" id="timelineGrid">
                <div class="empty-state">No tasks. Add your 24h plan above.</div>
            </div>
        </div>

        <div id="statusMessage">🔔 Ready. Add tasks, tap <span class="highlight">Start</span> to begin tracking.</div>
    </div>

    <!-- Modal for "Maybe Later" -->
    <div class="modal-overlay" id="maybeModal">
        <div class="modal">
            <div class="modal-header">
                <h2>📝 Maybe Later List</h2>
                <button class="close-btn" onclick="toggleModal(false)">✕</button>
            </div>
            <div class="modal-body" id="maybeListContainer">
                <div class="empty-maybe">No items. Add things you might do later.</div>
            </div>
            <div class="modal-input-row">
                <input type="text" id="maybeInput" placeholder="e.g. Go swimming">
                <button onclick="addMaybeItem()">➕ Add</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- CONFIG ----------
        // Local save works immediately. Email automation needs the Google Apps Script URL.
        const REPORT_EMAIL = 'da.umeshh@gmail.com';
        const REPORT_API_TOKEN = 'ww2AL52EEFJtIplNNmE1s3DUZG2kLt91';
        const REPORT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx-EQnbU4kbJ0XMj8cmLkN14eBakp8I1V4Lb3_eHNFWKO79b2dE3UxBBxxIhCQ_H03VgA/exec';
        const ENABLE_CLOUD_SYNC = true;

        const LOCAL_TASKS_KEY = 'honestyProTasksV2';
        const LEGACY_TASKS_KEY = 'tasks24';
        const LOCAL_DATE_KEY = 'honestyProDateKey';
        const LEGACY_DATE_KEY = 'currentDate';
        const HISTORY_KEY = 'history24';

        // ---------- CORE DATA ----------
        let tasks = [];
        let maybeItems = [];
        let activeTaskId = null;
        let alarmInterval = null;
        let secondTimer = null;
        let audioCtx = null;
        let editingTaskId = null;
        let currentDateKey = getDateKey();
        let lastCloudSyncMs = 0;

        // DOM refs
        const grid = document.getElementById('timelineGrid');
        const liveClock = document.getElementById('liveClock');
        const totalTasksSpan = document.getElementById('totalTasks');
        const totalPlannedSpan = document.getElementById('totalPlanned');
        const totalActualSpan = document.getElementById('totalActual');
        const totalLostSpan = document.getElementById('totalLost');
        const currentTaskDisplay = document.getElementById('currentTaskDisplay');
        const statusMsg = document.getElementById('statusMessage');
        const conflictWarning = document.getElementById('conflictWarning');
        const dateDisplay = document.getElementById('dateDisplay');

        // ---------- SAFE TEXT HELPERS ----------
        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[ch]));
        }

        function createTaskId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
        }

        // ---------- AUDIO + VIBRATION ----------
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playBeep(frequency = 800, duration = 300, times = 1, delay = 400) {
            try {
                const ctx = initAudio();
                let count = 0;

                function beep() {
                    if (count >= times) return;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = frequency;
                    osc.type = 'sine';
                    gain.gain.value = 0.3;
                    osc.start();
                    osc.stop(ctx.currentTime + duration / 1000);
                    count++;
                    if (count < times) {
                        setTimeout(beep, delay);
                    }
                }
                beep();
            } catch (e) {
                console.log('Audio error:', e);
            }

            if (navigator.vibrate) {
                const pattern = [];
                for (let i = 0; i < times; i++) {
                    pattern.push(duration);
                    if (i < times - 1) pattern.push(Math.max(50, delay - 100));
                }
                navigator.vibrate(pattern);
            }

            const body = document.body;
            body.style.transition = 'background 0.1s';
            body.style.background = '#7f1d1d';
            setTimeout(() => { body.style.background = '#0b1120'; }, 200);
            if (times > 1) {
                setTimeout(() => { body.style.background = '#7f1d1d'; }, 400);
                setTimeout(() => { body.style.background = '#0b1120'; }, 600);
            }
        }

        function testAlarm() {
            initAudio();
            playBeep(880, 300, 3, 300);
            statusMsg.innerHTML = '🔊 <span class="highlight">Alarm test!</span> You should hear 3 beeps + vibration + flash.';
            statusMsg.style.transition = 'background 0.1s';
            statusMsg.style.background = '#7f1d1d';
            setTimeout(() => { statusMsg.style.background = '#1e293b'; }, 300);
            setTimeout(() => { statusMsg.style.background = '#7f1d1d'; }, 600);
            setTimeout(() => { statusMsg.style.background = '#1e293b'; }, 900);
        }

        // ---------- TIME HELPERS ----------
        function getDateKey(date = new Date()) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function normalizeDateKey(value) {
            if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
            if (value) {
                const parsed = new Date(value);
                if (!Number.isNaN(parsed.getTime())) return getDateKey(parsed);
            }
            return getDateKey();
        }

        function dateFromKey(dateKey) {
            const [y, m, d] = String(dateKey).split('-').map(Number);
            return new Date(y, (m || 1) - 1, d || 1, 0, 0, 0, 0);
        }

        function nextMidnightMs(dateKey = currentDateKey) {
            const d = dateFromKey(dateKey);
            d.setDate(d.getDate() + 1);
            return d.getTime();
        }

        function timeToMinutes(timeStr) {
            if (!/^\d{2}:\d{2}$/.test(String(timeStr || ''))) return 0;
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function minutesToStr(min) {
            if (!Number.isFinite(min) || min < 0) min = 0;
            const rounded = Math.round(min);
            const h = Math.floor(rounded / 60);
            const m = rounded % 60;
            if (h === 0) return `${m}m`;
            if (m === 0) return `${h}h`;
            return `${h}h ${m}m`;
        }

        function getCurrentTimeStr() {
            const now = new Date();
            return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }

        async function syncToCloud() {
            if (!ENABLE_CLOUD_SYNC) return;
        
            await fetch(REPORT_WEB_APP_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    token: "YOUR_SECRET_TOKEN",
                    snapshot: tasks
                })
            });
        }

        function getCurrentMinutes() {
            const now = new Date();
            return now.getHours() * 60 + now.getMinutes();
        }

        function scheduledTimeMs(dateKey, timeStr) {
            const [h, m] = String(timeStr || '00:00').split(':').map(Number);
            const d = dateFromKey(dateKey);
            d.setHours(h || 0, m || 0, 0, 0);
            return d.getTime();
        }

        function taskEndMsForDate(task, dateKey = currentDateKey) {
            return scheduledTimeMs(dateKey, task.end);
        }

        function plannedMinutesOf(task) {
            return Math.max(0, timeToMinutes(task.end) - timeToMinutes(task.start));
        }

        function baseActualMs(task) {
            const fromMs = Number(task.actualMs);
            if (Number.isFinite(fromMs)) return Math.max(0, fromMs);
            const fromMinutes = Number(task.actualMinutes || 0);
            return Math.max(0, fromMinutes * 60000);
        }

        function getActualMs(task, capMs = Date.now(), dateKey = currentDateKey) {
            let total = baseActualMs(task);
            if (task.isActive && task.startedAtMs) {
                const sessionStart = Number(task.startedAtMs);
                const endCap = Math.min(capMs, taskEndMsForDate(task, dateKey), nextMidnightMs(dateKey));
                const elapsed = endCap - sessionStart;
                if (elapsed > 0) total += elapsed;
            }
            return Math.max(0, total);
        }

        function getActualMinutes(task, capMs = Date.now(), dateKey = currentDateKey) {
            return Math.round(getActualMs(task, capMs, dateKey) / 60000);
        }

        function finalizeElapsedForTask(task, capMs = Date.now(), dateKey = currentDateKey) {
            const actualMs = getActualMs(task, capMs, dateKey);
            task.actualMs = actualMs;
            task.actualMinutes = Math.round(actualMs / 60000);
            task.isActive = false;
            task.startedAtMs = null;
            if (activeTaskId === task.id) activeTaskId = null;
        }

        // ---------- AUTO-RESET + REPORT AT MIDNIGHT ----------
        function checkMidnightReset() {
            const todayKey = getDateKey();
            if (todayKey !== currentDateKey) {
                finalizeAndResetForNewDay(todayKey, 'midnight_reset');
            }
        }

        function freezeTaskForReport(task, dateKey, cutoffMs) {
            const actualMs = getActualMs(task, cutoffMs, dateKey);
            const plannedMinutes = plannedMinutesOf(task);
            return {
                id: task.id,
                name: task.name,
                start: task.start,
                end: task.end,
                plannedMinutes,
                actualMs,
                actualMinutes: Math.round(actualMs / 60000),
                lostMinutes: Math.max(0, plannedMinutes - Math.round(actualMs / 60000)),
                isFinished: !!task.isFinished,
                completed: !!task.completed,
                isActive: false,
                startedAtMs: null
            };
        }

        function buildSummary(reportTasks) {
            let planned = 0;
            let actual = 0;
            reportTasks.forEach(t => {
                planned += Number.isFinite(Number(t.plannedMinutes)) ? Number(t.plannedMinutes) : plannedMinutesOf(t);
                actual += Number.isFinite(Number(t.actualMinutes)) ? Number(t.actualMinutes) : getActualMinutes(t);
            });
            const lost = Math.max(0, planned - actual);
            return {
                totalTasks: reportTasks.length,
                totalPlannedMinutes: planned,
                totalActualMinutes: actual,
                totalLostMinutes: lost,
                completionPercent: planned > 0 ? Math.round((actual / planned) * 100) : 0
            };
        }

        function makeReport(dateKey, cutoffMs, reason) {
            const reportTasks = tasks.map(t => freezeTaskForReport(t, dateKey, cutoffMs));
            return {
                type: 'report',
                app: 'Honesty Timer Pro',
                recipient: REPORT_EMAIL,
                token: REPORT_API_TOKEN,
                dateKey,
                reason,
                createdAt: new Date().toISOString(),
                createdAtMs: Date.now(),
                tasks: reportTasks,
                summary: buildSummary(reportTasks),
                csv: buildCSV(reportTasks, dateKey)
            };
        }

        function finalizeAndResetForNewDay(todayKey = getDateKey(), reason = 'new_day') {
            const oldDateKey = currentDateKey;
            const cutoffMs = nextMidnightMs(oldDateKey);

            if (tasks.length > 0) {
                const report = makeReport(oldDateKey, cutoffMs, reason);
                saveReportToLocalHistory(report);
                postToReportServer(report, true);
            }

            tasks = [];
            activeTaskId = null;
            editingTaskId = null;
            currentDateKey = todayKey;
            if (alarmInterval) clearInterval(alarmInterval);
            if (secondTimer) clearInterval(secondTimer);
            alarmInterval = null;
            secondTimer = null;
            render();
            saveToLocal('new_day_reset', true);
            statusMsg.innerHTML = '🌅 <span class="highlight">New day!</span> Yesterday\'s data was saved and the task list was reset.';
            playBeep(600, 200, 2);
        }

        function saveReportToLocalHistory(report) {
            try {
                let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                history.push(report);
                if (history.length > 30) history = history.slice(-30);
                localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
                localStorage.setItem('lastHonestyReportDateKey', report.dateKey);
            } catch (e) {
                console.log('Could not save local report history:', e);
            }
        }

        // ---------- CONFLICT CHECK ----------
        function hasConflict(start, end, excludeId = null) {
            const startMin = timeToMinutes(start);
            const endMin = timeToMinutes(end);
            return tasks.some(t => {
                if (excludeId && t.id === excludeId) return false;
                const tStart = timeToMinutes(t.start);
                const tEnd = timeToMinutes(t.end);
                return (startMin < tEnd && endMin > tStart);
            });
        }

        // ---------- TASK CRUD ----------
        function addTask(name, start, end) {
            checkMidnightReset();
            if (!name.trim()) { alert('Enter a task name'); return; }
            if (start >= end) { alert('End time must be after start time'); return; }

            if (hasConflict(start, end)) {
                conflictWarning.classList.add('show');
                setTimeout(() => conflictWarning.classList.remove('show'), 3000);
                statusMsg.innerHTML = '⚠️ <span class="danger">Conflict!</span> Another task already occupies this time.';
                playBeep(400, 200, 2);
                return;
            }
            conflictWarning.classList.remove('show');

            const task = {
                id: createTaskId(),
                name: name.trim(),
                start,
                end,
                isActive: false,
                isFinished: false,
                actualMs: 0,
                actualMinutes: 0,
                startedAtMs: null,
                completed: false
            };
            tasks.push(task);
            tasks.sort((a, b) => a.start.localeCompare(b.start));
            render();
            saveToLocal('task_added');
            statusMsg.innerHTML = `✅ Added "${escapeHtml(task.name)}" ${start}—${end}`;
            playBeep(600, 150, 1);
        }

        function deleteTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task && task.isActive) {
                finalizeElapsedForTask(task);
            }
            tasks = tasks.filter(t => t.id !== id);
            if (editingTaskId === id) editingTaskId = null;
            render();
            saveToLocal('task_deleted');
            statusMsg.innerHTML = '🗑️ Task removed.';
        }

        // ---------- EDIT TASK ----------
        function startEdit(id) {
            if (editingTaskId && editingTaskId !== id) {
                cancelEdit(editingTaskId);
            }
            editingTaskId = id;
            render();
        }

        function cancelEdit(id) {
            if (editingTaskId === id) {
                editingTaskId = null;
                render();
            }
        }

        function saveEdit(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            const row = document.querySelector(`[data-task-id="${id}"]`);
            if (!row) return;

            const nameInput = row.querySelector('.edit-name');
            const startInput = row.querySelector('.edit-start');
            const endInput = row.querySelector('.edit-end');

            const newName = nameInput.value.trim();
            const newStart = startInput.value;
            const newEnd = endInput.value;

            if (!newName) { alert('Task name cannot be empty'); return; }
            if (newStart >= newEnd) { alert('End time must be after start time'); return; }

            if (hasConflict(newStart, newEnd, id)) {
                conflictWarning.classList.add('show');
                setTimeout(() => conflictWarning.classList.remove('show'), 3000);
                statusMsg.innerHTML = '⚠️ <span class="danger">Conflict!</span> This time overlaps with another task.';
                playBeep(400, 200, 2);
                return;
            }
            conflictWarning.classList.remove('show');

            if (task.isActive) {
                finalizeElapsedForTask(task);
            }

            task.name = newName;
            task.start = newStart;
            task.end = newEnd;

            tasks.sort((a, b) => a.start.localeCompare(b.start));
            editingTaskId = null;
            render();
            saveToLocal('task_edited');
            statusMsg.innerHTML = `✏️ Updated "${escapeHtml(task.name)}" to ${task.start}—${task.end}`;
            playBeep(500, 150, 1);
        }

        // ---------- START / STOP ----------
        function startTask(id) {
            checkMidnightReset();
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            if (task.isActive) return;

            if (editingTaskId) {
                cancelEdit(editingTaskId);
            }

            tasks.forEach(t => {
                if (t.isActive && t.id !== id) {
                    finalizeElapsedForTask(t);
                }
            });

            initAudio();

            task.isActive = true;
            task.isFinished = false;
            activeTaskId = id;
            task.startedAtMs = Date.now();

            playBeep(880, 200, 2);
            statusMsg.innerHTML = `🔔 <span class="highlight">STARTED</span> "${escapeHtml(task.name)}" at ${getCurrentTimeStr()}`;

            if (alarmInterval) clearInterval(alarmInterval);
            alarmInterval = setInterval(checkAlarms, 5000);
            checkAlarms();
            ensureSecondTimer();

            render();
            saveToLocal('task_started', true);
        }

        function stopTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            if (task.isActive) {
                finalizeElapsedForTask(task);
            }

            render();
            saveToLocal('task_stopped', true);
            statusMsg.innerHTML = `⏹️ Stopped "${escapeHtml(task.name)}"`;
            ensureSecondTimer();
        }

        // ---------- ALARM CHECKER ----------
        function checkAlarms() {
            checkMidnightReset();
            const now = Date.now();
            let changed = false;

            tasks.forEach(task => {
                if (!task.isActive) return;
                if (now >= taskEndMsForDate(task, currentDateKey)) {
                    playBeep(1000, 400, 3, 350);

                    finalizeElapsedForTask(task, taskEndMsForDate(task, currentDateKey), currentDateKey);
                    task.isFinished = true;
                    activeTaskId = null;
                    changed = true;

                    const row = document.querySelector(`[data-task-id="${task.id}"]`);
                    if (row) {
                        row.classList.add('finished-alarm');
                        setTimeout(() => row.classList.remove('finished-alarm'), 2000);
                    }

                    statusMsg.innerHTML =
                        `🔔 <span class="danger">FINISHED</span> "${escapeHtml(task.name)}" at ${task.end}! Actual: <span class="highlight">${minutesToStr(task.actualMinutes)}</span>`;
                }
            });

            if (changed) {
                render();
                saveToLocal('alarm_finished', true);
            }
            ensureSecondTimer();
        }

        function ensureSecondTimer() {
            const hasActive = tasks.some(t => t.isActive);
            if (hasActive && !secondTimer) {
                secondTimer = setInterval(() => {
                    render();
                    checkAlarms();
                    checkMidnightReset();
                }, 1000);
            }
            if (!hasActive && secondTimer) {
                clearInterval(secondTimer);
                secondTimer = null;
            }
        }

        // ---------- BACKGROUND / CLOSE HANDLING ----------
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                saveToLocal('visibility_hidden', true);
            } else {
                checkMidnightReset();
                checkAlarms();
                render();
                saveToLocal('visibility_visible');
            }
        });

        window.addEventListener('pagehide', () => saveToLocal('pagehide', true));
        window.addEventListener('beforeunload', () => saveToLocal('beforeunload', true));

        // ---------- RENDER ----------
        function render() {
            updateStats();

            if (tasks.length === 0) {
                grid.innerHTML = `<div class="empty-state">No tasks planned. Build your 24h schedule!</div>`;
                updateCurrentTask();
                dateDisplay.innerText = new Date().toLocaleDateString();
                return;
            }

            let html = '';
            tasks.forEach(task => {
                const isActive = task.isActive;
                const isEditing = (editingTaskId === task.id);
                const plannedMin = plannedMinutesOf(task);
                const actualMin = getActualMinutes(task);
                const lostMin = Math.max(0, plannedMin - actualMin);
                const percent = plannedMin > 0 ? Math.min(100, (actualMin / plannedMin) * 100) : 0;

                let progress = 0;
                if (isActive) {
                    const nowMs = Date.now();
                    const startMs = scheduledTimeMs(currentDateKey, task.start);
                    const endMs = taskEndMsForDate(task, currentDateKey);
                    const total = endMs - startMs;
                    const elapsed = nowMs - startMs;
                    progress = total > 0 ? Math.min(100, Math.max(0, (elapsed / total) * 100)) : 0;
                } else if (task.isFinished) {
                    progress = 100;
                }

                const percentColor = percent >= 80 ? '#4ade80' : percent >= 50 ? '#fbbf24' : '#f87171';
                const safeName = escapeHtml(task.name);

                html += `
                    <div class="task-row ${isActive ? 'active' : ''} ${isEditing ? 'editing' : ''}" data-task-id="${task.id}">
                        <div class="task-top">
                            <span class="task-time">${task.start}—${task.end}</span>
                            <span class="task-name">${safeName}</span>
                        </div>
                        <div class="task-stats">
                            <span>Planned: <strong>${minutesToStr(plannedMin)}</strong></span>
                            <span class="actual">Actual: <strong>${minutesToStr(actualMin)}</strong></span>
                            ${lostMin > 0 ? `<span class="lost">Lost: ${minutesToStr(lostMin)}</span>` : ''}
                        </div>
                        <div class="task-progress">
                            <div class="bar-bg">
                                <div class="fill" style="width: ${progress}%;"></div>
                            </div>
                            <span class="percent" style="color: ${percentColor};">${Math.round(percent)}% done</span>
                        </div>

                        <div class="edit-fields">
                            <input type="text" class="edit-name" value="${safeName}" placeholder="Task name">
                            <input type="time" class="edit-start" value="${task.start}">
                            <input type="time" class="edit-end" value="${task.end}">
                        </div>

                        <div class="task-actions">
                            ${isEditing ? `
                                <button class="save-edit-btn" onclick="saveEdit('${task.id}')">💾 Save</button>
                                <button class="cancel-edit-btn" onclick="cancelEdit('${task.id}')">✕ Cancel</button>
                            ` : `
                                ${!isActive ? `<button class="start-btn" onclick="startTask('${task.id}')">▶ Start</button>` 
                                             : `<button class="stop-btn" onclick="stopTask('${task.id}')">⏹ Stop</button>`}
                                <button class="edit-btn" onclick="startEdit('${task.id}')">✏️ Edit</button>
                                <button class="delete-btn" onclick="deleteTask('${task.id}')">✕</button>
                            `}
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
            updateCurrentTask();
            dateDisplay.innerText = new Date().toLocaleDateString();

            if (editingTaskId) {
                const row = document.querySelector(`[data-task-id="${editingTaskId}"]`);
                if (row) {
                    const nameInput = row.querySelector('.edit-name');
                    if (nameInput) {
                        setTimeout(() => nameInput.focus(), 100);
                        nameInput.select();
                    }
                }
            }
        }

        // ---------- STATS ----------
        function updateStats() {
            totalTasksSpan.innerText = tasks.length;

            let plannedMin = 0;
            let actualMin = 0;
            tasks.forEach(t => {
                plannedMin += plannedMinutesOf(t);
                actualMin += getActualMinutes(t);
            });

            const lostMin = Math.max(0, plannedMin - actualMin);
            totalPlannedSpan.innerText = minutesToStr(plannedMin);
            totalActualSpan.innerText = minutesToStr(actualMin);
            totalLostSpan.innerText = minutesToStr(lostMin);

            if (lostMin > 30) totalLostSpan.style.color = '#f87171';
            else if (lostMin > 10) totalLostSpan.style.color = '#fbbf24';
            else totalLostSpan.style.color = '#4ade80';
        }

        function updateCurrentTask() {
            const active = tasks.find(t => t.isActive);
            currentTaskDisplay.innerText = active ? active.name : 'None';
        }

        // ---------- EXPORT TO EXCEL / CSV ----------
        function csvEscape(value) {
            const str = String(value ?? '');
            if (/[",\n]/.test(str)) return `"${str.replace(/"/g, '""')}"`;
            return str;
        }

        function buildCSV(reportTasks = tasks, reportDateKey = currentDateKey) {
            let csv = 'Date,Task,Start,End,Planned (min),Actual (min),Lost (min),Completion %\n';
            reportTasks.forEach(t => {
                const planned = Number.isFinite(Number(t.plannedMinutes)) ? Number(t.plannedMinutes) : plannedMinutesOf(t);
                const actual = Number.isFinite(Number(t.actualMinutes)) ? Number(t.actualMinutes) : getActualMinutes(t);
                const lost = Math.max(0, planned - actual);
                const pct = planned > 0 ? Math.round((actual / planned) * 100) : 0;
                csv += [
                    csvEscape(reportDateKey),
                    csvEscape(t.name),
                    csvEscape(t.start),
                    csvEscape(t.end),
                    planned,
                    actual,
                    lost,
                    `${pct}%`
                ].join(',') + '\n';
            });

            const summary = buildSummary(reportTasks.map(t => ({
                ...t,
                plannedMinutes: Number.isFinite(Number(t.plannedMinutes)) ? Number(t.plannedMinutes) : plannedMinutesOf(t),
                actualMinutes: Number.isFinite(Number(t.actualMinutes)) ? Number(t.actualMinutes) : getActualMinutes(t)
            })));

            csv += `\n${[csvEscape(reportDateKey), csvEscape('TOTAL'), '', '', summary.totalPlannedMinutes, summary.totalActualMinutes, summary.totalLostMinutes, `${summary.completionPercent}%`].join(',')}\n`;
            csv += `\n${csvEscape('Report date: ' + reportDateKey)}\n`;
            csv += `${csvEscape('Exported on: ' + new Date().toLocaleString())}\n`;
            return csv;
        }

        function downloadCSV(csv, reportDateKey = currentDateKey) {
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `productivity_${reportDateKey}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function exportCSV() {
            if (tasks.length === 0) {
                statusMsg.innerHTML = '⚠️ No tasks to export. Add some tasks first!';
                return;
            }
            const snapshotTasks = tasks.map(t => freezeTaskForReport(t, currentDateKey, Date.now()));
            const csv = buildCSV(snapshotTasks, currentDateKey);
            downloadCSV(csv, currentDateKey);
            statusMsg.innerHTML = '📊 <span class="highlight">Exported!</span> CSV file downloaded. Open it in Excel.';
            return csv;
        }

        // ---------- CLOUD SYNC / EMAIL SERVER ----------
        function taskForStorage(task) {
            return {
                id: task.id,
                name: task.name,
                start: task.start,
                end: task.end,
                actualMs: baseActualMs(task),
                actualMinutes: Math.round(baseActualMs(task) / 60000),
                isActive: !!task.isActive,
                isFinished: !!task.isFinished,
                startedAtMs: task.isActive ? Number(task.startedAtMs || Date.now()) : null,
                completed: !!task.completed
            };
        }

        function getSnapshotForCloud(reason = 'save') {
            const storageTasks = tasks.map(taskForStorage);
            const liveTasks = tasks.map(t => freezeTaskForReport(t, currentDateKey, Date.now()));
            return {
                type: 'snapshot',
                app: 'Honesty Timer Pro',
                recipient: REPORT_EMAIL,
                token: REPORT_API_TOKEN,
                dateKey: currentDateKey,
                reason,
                savedAt: new Date().toISOString(),
                savedAtMs: Date.now(),
                tasks: storageTasks,
                summary: buildSummary(liveTasks)
            };
        }

        function postToReportServer(payload, force = false) {
            if (!ENABLE_CLOUD_SYNC || !REPORT_WEB_APP_URL.trim()) return;
            const body = JSON.stringify(payload);

            try {
                if (force && navigator.sendBeacon) {
                    const queued = navigator.sendBeacon(
                        REPORT_WEB_APP_URL,
                        new Blob([body], { type: 'text/plain;charset=UTF-8' })
                    );
                    if (queued) return;
                }

                fetch(REPORT_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
                    body,
                    keepalive: !!force
                }).catch(err => console.log('Cloud sync failed:', err));
            } catch (e) {
                console.log('Cloud sync error:', e);
            }
        }

        function syncSnapshotToCloud(reason = 'save', force = false) {
            if (!ENABLE_CLOUD_SYNC || !REPORT_WEB_APP_URL.trim()) return;
            const now = Date.now();
            if (!force && now - lastCloudSyncMs < 5000) return;
            lastCloudSyncMs = now;
            postToReportServer(getSnapshotForCloud(reason), force);
        }

        // ---------- "MAYBE LATER" LIST ----------
        function toggleModal(show) {
            const modal = document.getElementById('maybeModal');
            if (show) {
                modal.classList.add('show');
                renderMaybeList();
                document.getElementById('maybeInput').focus();
            } else {
                modal.classList.remove('show');
            }
        }

        function addMaybeItem() {
            const input = document.getElementById('maybeInput');
            const text = input.value.trim();
            if (!text) return;
            maybeItems.push({ id: createTaskId(), text });
            input.value = '';
            saveMaybeToLocal();
            renderMaybeList();
        }

        function deleteMaybeItem(id) {
            maybeItems = maybeItems.filter(item => item.id !== id);
            saveMaybeToLocal();
            renderMaybeList();
        }

        function addMaybeToTask(id) {
            const item = maybeItems.find(i => i.id === id);
            if (!item) return;
            document.getElementById('taskName').value = item.text;
            const now = new Date();
            const end = new Date(now.getTime() + 60 * 60000);
            document.getElementById('startTime').value = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.getElementById('endTime').value = `${String(end.getHours()).padStart(2, '0')}:${String(end.getMinutes()).padStart(2, '0')}`;
            deleteMaybeItem(id);
            toggleModal(false);
            statusMsg.innerHTML = `📝 Moved "${escapeHtml(item.text)}" to task form. Click Add to schedule it.`;
            document.getElementById('addTaskBtn').focus();
        }

        function renderMaybeList() {
            const container = document.getElementById('maybeListContainer');
            if (maybeItems.length === 0) {
                container.innerHTML = `<div class="empty-maybe">No items. Add things you might do later.</div>`;
                return;
            }
            let html = '';
            maybeItems.forEach(item => {
                html += `
                    <div class="maybe-item">
                        <span class="item-text">${escapeHtml(item.text)}</span>
                        <div class="item-actions">
                            <button class="add-to-task" onclick="addMaybeToTask('${item.id}')" title="Add to schedule">📋</button>
                            <button class="delete-maybe" onclick="deleteMaybeItem('${item.id}')" title="Delete">✕</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function saveMaybeToLocal() {
            try {
                localStorage.setItem('maybeItems', JSON.stringify(maybeItems));
            } catch (e) {}
        }

        function loadMaybeFromLocal() {
            try {
                const data = localStorage.getItem('maybeItems');
                if (data) {
                    maybeItems = JSON.parse(data);
                }
            } catch (e) {}
        }

        // ---------- STORAGE ----------
        function normalizeTask(raw) {
            const actualMs = Number.isFinite(Number(raw.actualMs))
                ? Math.max(0, Number(raw.actualMs))
                : Math.max(0, Number(raw.actualMinutes || 0) * 60000);
            return {
                id: raw.id || createTaskId(),
                name: raw.name || 'Task',
                start: raw.start || '00:00',
                end: raw.end || '00:00',
                actualMs,
                actualMinutes: Math.round(actualMs / 60000),
                isActive: !!raw.isActive && !!raw.startedAtMs,
                isFinished: !!raw.isFinished,
                startedAtMs: raw.isActive && raw.startedAtMs ? Number(raw.startedAtMs) : null,
                completed: !!raw.completed
            };
        }

        function saveToLocal(reason = 'save', forceCloud = false) {
            try {
                const data = tasks.map(taskForStorage);
                localStorage.setItem(LOCAL_TASKS_KEY, JSON.stringify(data));
                localStorage.setItem(LEGACY_TASKS_KEY, JSON.stringify(data));
                localStorage.setItem(LOCAL_DATE_KEY, currentDateKey);
                localStorage.setItem(LEGACY_DATE_KEY, currentDateKey);
            } catch (e) {
                console.log('Local save failed:', e);
            }
            if (reason) syncSnapshotToCloud(reason, forceCloud);
        }

        function loadFromLocal() {
            try {
                currentDateKey = normalizeDateKey(localStorage.getItem(LOCAL_DATE_KEY) || localStorage.getItem(LEGACY_DATE_KEY));
                const data = localStorage.getItem(LOCAL_TASKS_KEY) || localStorage.getItem(LEGACY_TASKS_KEY);
                if (data) {
                    tasks = JSON.parse(data).map(normalizeTask);
                }
            } catch (e) {
                console.log('Local load failed:', e);
            }

            const todayKey = getDateKey();
            if (todayKey !== currentDateKey) {
                finalizeAndResetForNewDay(todayKey, 'opened_after_midnight');
                return;
            }

            const active = tasks.find(t => t.isActive && t.startedAtMs);
            activeTaskId = active ? active.id : null;
            checkAlarms();
            render();
            ensureSecondTimer();
            saveToLocal('load');
        }

        // ---------- CLOCK ----------
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            liveClock.innerText = `${h}:${m}:${s}`;
        }

        // ---------- EVENTS ----------
        document.getElementById('addTaskBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const name = document.getElementById('taskName').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            addTask(name, start, end);
        });

        document.getElementById('clearAllBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Delete ALL tasks? This resets all tracking.')) {
                tasks = [];
                activeTaskId = null;
                editingTaskId = null;
                if (alarmInterval) clearInterval(alarmInterval);
                if (secondTimer) clearInterval(secondTimer);
                alarmInterval = null;
                secondTimer = null;
                render();
                saveToLocal('all_cleared', true);
                statusMsg.innerHTML = '🗑️ All tasks cleared.';
            }
        });

        document.getElementById('maybeInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addMaybeItem();
        });

        document.getElementById('maybeModal').addEventListener('click', function(e) {
            if (e.target === this) toggleModal(false);
        });

        document.querySelectorAll('.input-section input').forEach(inp => {
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('addTaskBtn').click();
            });
        });

        // ---------- INIT ----------
        loadMaybeFromLocal();
        loadFromLocal();
        updateClock();
        setInterval(updateClock, 1000);
        setInterval(checkAlarms, 10000);
        setInterval(checkMidnightReset, 30000);
        setInterval(() => {
            if (tasks.some(t => t.isActive)) saveToLocal('autosave');
        }, 15000);

        document.addEventListener('touchstart', function initAudioOnTouch() {
            initAudio();
            document.removeEventListener('touchstart', initAudioOnTouch);
        }, { once: true });

        console.log('✅ Honesty Pro loaded with local close-safe saving, midnight reset, and optional Apps Script email sync.');
    </script>

</body>
</html>
